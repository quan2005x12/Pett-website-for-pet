<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Giỏ hàng - PETT | Pet Boutique</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&amp;family=Be+Vietnam+Pro:wght@400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        primary: "#006b5f",
                        "primary-container": "#14b8a6",
                        "on-primary": "#ffffff",
                        "on-primary-container": "#00423b",
                        background: "#fbfaee",
                        surface: "#fbfaee",
                        "on-surface": "#1b1c15",
                        "on-surface-variant": "#3c4947",
                        "surface-container-low": "#f5f4e8",
                        "surface-container": "#efeee3",
                        "surface-container-high": "#e9e9dd",
                        "surface-container-highest": "#e4e3d7",
                        "surface-container-lowest": "#ffffff",
                    },
                    borderRadius: {
                        DEFAULT: "1rem",
                        lg: "2rem",
                        xl: "3rem",
                        full: "9999px",
                    },
                    fontFamily: {
                        headline: ["Plus Jakarta Sans"],
                        body: ["Be Vietnam Pro"],
                        label: ["Plus Jakarta Sans"],
                    }
                },
            },
        }
    </script>
<style>
        body { font-family: 'Be Vietnam Pro', sans-serif; }
        h1, h2, h3, .font-headline { font-family: 'Plus Jakarta Sans', sans-serif; }
        .glass-nav {
            background: rgba(251, 250, 238, 0.7);
            backdrop-filter: blur(24px);
        }
    </style>
</head>
<body class="bg-background text-on-surface antialiased min-h-screen flex flex-col">
<!-- Top Nav -->
<nav class="fixed top-0 w-full z-50 glass-nav shadow-sm shadow-stone-200/20">
<div class="flex justify-between items-center px-6 py-4 max-w-7xl mx-auto">
<a class="text-2xl font-bold tracking-tighter text-teal-700 font-headline" href="/" data-route="/">PETT</a>
<div class="hidden md:flex items-center gap-8 font-headline font-bold text-stone-600">
<a class="hover:text-teal-500 transition-colors" href="/shop" data-route="/shop">Cửa hàng</a>
<a class="hover:text-teal-500 transition-colors" href="/blog" data-route="/blog">Blog</a>
<a class="hover:text-teal-500 transition-colors" href="/goi-dinh-ky" data-route="/goi-dinh-ky">Gói định kỳ</a>
</div>
<div class="flex items-center gap-4">
<a href="/login" data-route="/login" class="p-2 hover:bg-stone-100/50 rounded-full transition-all active:scale-90 text-stone-600 flex items-center justify-center"><span class="material-symbols-outlined">person</span></a>
</div>
</div>
</nav>
<main class="grow pt-28 pb-20 px-6 max-w-7xl mx-auto w-full">
<div class="flex flex-col lg:flex-row gap-12">
<!-- Left: Cart Items -->
<div class="grow space-y-8">
<div class="flex items-end justify-between border-b border-surface-container-highest pb-6">
<h1 class="text-4xl font-headline font-black tracking-tight">Giỏ hàng</h1>
<span id="cart-count-header" class="text-on-surface-variant font-bold">0 sản phẩm</span>
</div>
<div id="cart-items-container" class="space-y-6">
<!-- Items will be injected here -->
<div class="py-20 text-center">
<div class="w-20 h-20 bg-surface-container rounded-full flex items-center justify-center mx-auto mb-4 text-on-surface-variant/30">
<span class="material-symbols-outlined text-4xl">shopping_cart_off</span>
</div>
<p class="text-on-surface-variant font-medium">Giỏ hàng của bạn đang trống</p>
<button class="mt-6 px-8 py-3 bg-primary text-white font-bold rounded-full hover:scale-105 transition-all" data-route="/shop">Tiếp tục mua sắm</button>
</div>
</div>
</div>
<!-- Right: Order Summary -->
<div class="w-full lg:w-96">
<div class="sticky top-28 bg-surface-container-low rounded-3xl p-8 shadow-sm">
<h2 class="text-xl font-headline font-bold mb-8">Tóm tắt đơn hàng</h2>
<div class="space-y-4 mb-8 text-sm font-medium">
<div class="flex justify-between text-on-surface-variant">
<span>Tạm tính</span>
<span id="cart-subtotal" class="text-on-surface font-bold">0₫</span>
</div>
<div class="flex justify-between text-on-surface-variant">
<span>Phí vận chuyển</span>
<span id="cart-shipping" class="text-on-surface font-bold">0₫</span>
</div>
<p class="text-[10px] text-on-surface-variant/60 leading-relaxed">Phí vận chuyển được miễn phí cho đơn hàng từ 500.000₫</p>
</div>
<div class="pt-6 border-t border-surface-container-highest">
<div class="flex justify-between items-end mb-8">
<span class="text-base font-bold uppercase tracking-widest text-on-surface-variant">Tổng cộng</span>
<span id="cart-total" class="text-3xl font-headline font-black text-primary">0₫</span>
</div>
<button id="checkout-btn" data-route="/checkout" class="w-full py-5 bg-[#006b5f] text-white font-headline font-bold text-center rounded-full shadow-xl shadow-teal-900/10 hover:scale-[1.02] transition-all active:scale-95 flex items-center justify-center gap-2">
                            Thanh toán ngay
                            <span class="material-symbols-outlined">arrow_forward</span>
</button>
</div>
</div>
</div>
</div>
</main>
<script>
    ;(() => {
        const storageKey = 'pett_stitch_cart_v2'
        const container = document.getElementById('cart-items-container')
        const subtotalEl = document.getElementById('cart-subtotal')
        const shippingEl = document.getElementById('cart-shipping')
        const totalEl = document.getElementById('cart-total')
        const headerCountEl = document.getElementById('cart-count-header')
        const checkoutBtn = document.getElementById('checkout-btn')

        const formatMoney = (v) => `${Math.max(0, Math.round(v)).toLocaleString('vi-VN')}₫`
        
        const loadCart = () => {
            try {
                return JSON.parse(localStorage.getItem(storageKey) || '[]')
            } catch { return [] }
        }

        const saveCart = (items) => {
            localStorage.setItem(storageKey, JSON.stringify(items))
            render()
        }

        const updateQuantity = (id, delta) => {
            const items = loadCart()
            const item = items.find(i => i.id === id)
            if (item) {
                item.quantity = Math.max(1, (item.quantity || 1) + delta)
                saveCart(items)
            }
        }

        const removeItem = (id) => {
            const items = loadCart()
            saveCart(items.filter(i => i.id !== id))
        }

        const render = () => {
            const items = loadCart()
            
            // Header count
            headerCountEl.textContent = `${items.length} sản phẩm`

            if (items.length === 0) {
                container.innerHTML = `
                    <div class="py-20 text-center">
                        <div class="w-20 h-20 bg-surface-container rounded-full flex items-center justify-center mx-auto mb-4 text-on-surface-variant/30">
                            <span class="material-symbols-outlined text-4xl">shopping_cart_off</span>
                        </div>
                        <p class="text-on-surface-variant font-medium">Giỏ hàng của bạn đang trống</p>
                        <button class="mt-6 px-8 py-3 bg-primary text-white font-bold rounded-full hover:scale-105 transition-all" data-route="/shop">Tiếp tục mua sắm</button>
                    </div>
                `
                subtotalEl.textContent = '0₫'
                shippingEl.textContent = '0₫'
                totalEl.textContent = '0₫'
                
                // Disable checkout
                if (checkoutBtn) {
                    checkoutBtn.disabled = true
                    checkoutBtn.style.opacity = '0.5'
                    checkoutBtn.style.cursor = 'not-allowed'
                }
                return
            }
            
            // Enable checkout if has items
            if (checkoutBtn) {
                checkoutBtn.disabled = false
                checkoutBtn.style.opacity = '1'
                checkoutBtn.style.cursor = 'pointer'
            }

            container.innerHTML = items.map(item => {
                const isSubscription = item && (
                    item.category === 'subscription'
                    || (typeof item.id === 'string' && item.id.startsWith('plan-'))
                    || (typeof item.name === 'string' && item.name.startsWith('Gói'))
                )

                return `
                <div class="flex gap-6 p-6 bg-surface-container-low rounded-3xl group transition-all hover:shadow-md border border-transparent hover:border-surface-container-highest">
                    ${isSubscription ? '' : `
                    <div class="w-24 h-24 sm:w-32 sm:h-32 rounded-2xl overflow-hidden bg-surface-container shrink-0">
                        <img src="${item.image || '/images/pett-bag.webp'}" class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500" alt="${item.name}">
                    </div>`}
                    <div class="flex-grow flex flex-col sm:flex-row justify-between gap-4">
                        <div class="space-y-1">
                            <h3 class="font-headline font-bold text-lg text-on-surface">${item.name}</h3>
                            <p class="text-sm text-on-surface-variant">${item.description || ''}</p>
                            <div class="pt-4 flex items-center gap-6">
                                <div class="flex items-center bg-white rounded-full p-1 border border-surface-container-highest">
                                    <button onclick="window.__pettUpdateQty('${item.id}', -1)" class="w-8 h-8 flex items-center justify-center hover:bg-surface-container rounded-full transition-colors">
                                        <span class="material-symbols-outlined text-sm">remove</span>
                                    </button>
                                    <span class="w-10 text-center font-bold text-sm">${item.quantity}</span>
                                    <button onclick="window.__pettUpdateQty('${item.id}', 1)" class="w-8 h-8 flex items-center justify-center hover:bg-surface-container rounded-full transition-colors">
                                        <span class="material-symbols-outlined text-sm">add</span>
                                    </button>
                                </div>
                                <button onclick="window.__pettRemoveItem('${item.id}')" class="text-xs font-bold text-coral-500 hover:text-coral-600 uppercase tracking-widest">Xóa</button>
                            </div>
                        </div>
                        <div class="text-right flex flex-col justify-between">
                            <div class="text-xl font-headline font-black text-primary">${formatMoney(item.price * item.quantity)}</div>
                            <div class="text-[10px] text-on-surface-variant font-bold uppercase opacity-50">${formatMoney(item.price)} / sản phẩm</div>
                        </div>
                    </div>
                </div>
            `
            }).join('')

            const subtotal = items.reduce((s, i) => s + (i.price * i.quantity), 0)
            const shipping = subtotal >= 500000 ? 0 : 30000
            const total = subtotal + shipping

            subtotalEl.textContent = formatMoney(subtotal)
            shippingEl.textContent = shipping === 0 ? 'Miễn phí' : formatMoney(shipping)
            totalEl.textContent = formatMoney(total)
        }

        window.__pettUpdateQty = updateQuantity
        window.__pettRemoveItem = removeItem
        
        render()
        
        // Listen for storage changes from other tabs
        window.addEventListener('storage', (e) => { if (e.key === storageKey) render() })
    })()
</script>
</body>
</html>
